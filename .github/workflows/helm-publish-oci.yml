name: Publish Helm Charts to OCI

on:
  workflow_call:
    inputs:
      oci_registry:
        description: "OCI registry to publish charts to"
        required: false
        default: "ghcr.io"
        type: string
      charts_dir:
        description: "Directory containing helm charts"
        required: false
        default: "charts"
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Login to OCI Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.oci_registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and Push Chart
        env:
          CHARTS_DIR: ${{ inputs.charts_dir }}
          OCI_REGISTRY: ${{ inputs.oci_registry }}
        run: |
          helm package "$CHARTS_DIR" --destination /tmp/
          helm push /tmp/*.tgz "oci://$OCI_REGISTRY/${{ github.repository_owner }}/charts"
