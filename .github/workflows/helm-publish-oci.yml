name: Publish Helm Charts to OCI

on:
  workflow_call:
    inputs:
      oci_registry:
        description: "OCI registry to publish charts to"
        required: false
        default: "ghcr.io"
        type: string
      charts_dir:
        description: "Directory containing helm charts"
        required: false
        default: "charts"
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to OCI Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.oci_registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and Push Charts
        run: |
          mkdir -p /tmp/helm-charts
          for chart in ${{ inputs.charts_dir }}/*/; do
            if [ -f "${chart}Chart.yaml" ]; then
              helm package "${chart}" --destination /tmp/helm-charts/
            fi
          done
          for chart in /tmp/helm-charts/*.tgz; do
            helm push "${chart}" oci://${{ inputs.oci_registry }}/${{ github.repository_owner }}
          done
